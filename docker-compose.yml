version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: aegis_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - aegis_network

  ai_engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    container_name: aegis_ai_engine
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    networks:
      - aegis_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aegis_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/cyber_defense_platform
      - AI_ENGINE_URL=http://ai_engine:8000
      - PORT=5000
      - JWT_SECRET=SUPER_SECURE_CYBER_JWT_SECRET
    depends_on:
      - mongodb
      - ai_engine
    networks:
      - aegis_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aegis_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - aegis_network

volumes:
  mongo_data:

networks:
  aegis_network:
    driver: bridge
